spring.application.name=msvc-registration-service
server.port=8004

spring.datasource.url=jdbc:h2:file:./data/msvc-registration-service
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs/swagger-ui.html

# Registro en Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# CLAVE SECRETA JWT: EXACTAMENTE la misma que en msvc-auth-service y el gateway.
jwt.secret=clave-secreta-super-segura-para-jwt-esports-arena-manager-grupo18-2026
