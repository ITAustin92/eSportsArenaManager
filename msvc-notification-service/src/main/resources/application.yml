eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true
jwt:
    secret: clave-secreta-super-segura-para-jwt-esports-arena-manager-grupo18-2026
server:
    port: 8010
spring:
    application:
        name: msvc-notification-service
    datasource:
        driver-class-name: org.h2.Driver
        password: sa
        url: jdbc:h2:file:./data/msvc-notification-service
        username: sa
    h2:
        console:
            enabled: true
            path: /h2-console
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        defer-datasource-initialization: true
        hibernate:
            ddl-auto: create-drop
        show-sql: true
    sql:
        init:
            mode: always
springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        enabled: true
        path: /docs/swagger-ui.html
