eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true
jwt:
    expiration-minutes: 60
    secret: clave-secreta-super-segura-para-jwt-esports-arena-manager-grupo18-2026
server:
    port: 8099
spring:
    application:
        name: msvc-auth-service
    datasource:
        driver-class-name: org.h2.Driver
        password: sa
        url: jdbc:h2:file:./data/auth
        username: sa
    h2:
        console:
            enabled: true
            path: /h2-console
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: update
        show-sql: true
springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        enabled: true
        path: /docs/swagger-ui.html
